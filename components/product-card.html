<article class="product-card" data-id="{{ID}}">
    <div class="card-img-wrapper">
        <img src="{{IMAGE}}" alt="{{NAME}}" class="product-card-img" onerror="this.onerror=null; this.src='image/produk/produk1.png';">
        <button class="btn-wishlist" aria-label="Tambah ke wishlist">
            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"></path>
            </svg>
        </button>
    </div>
    <div class="card-content">
        <span class="card-category">{{CATEGORY}}</span>
        <h3 class="card-title">{{NAME}}</h3>
        <div class="rating-row">
            <svg class="star-icon" xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24">
                <polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"></polygon>
            </svg>
            <strong>{{RATING}}</strong>
            <span>({{REVIEWS}} ulasan)</span>
        </div>
        <div class="card-price">Rp {{PRICE}}</div>
        <a href="pages/detail-produk.html?id={{ID}}" class="btn-card-detail">Lihat Detail</a>
    </div>
</article>
