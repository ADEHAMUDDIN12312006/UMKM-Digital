<!DOCTYPE html>
<html lang="id">
<head>
    <script src="../js/auth-guard.js"></script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Upload Bukti Pembayaran - UMKM Digital</title>
    <!-- Custom Styles Links -->
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="../css/payment.css">
</head>
<body>
    <!-- 1. Header Component (Top Navigation - Injected dynamically) -->
    <header class="main-header"></header>

    <main class="payment-container">
        <div class="payment-card">
            <h1 class="payment-title">Transfer Bank</h1>
            <p class="payment-subtitle">Silakan transfer pembayaran Anda ke salah satu rekening resmi kami di bawah ini.</p>

            <!-- Bank Account Info -->
            <div class="bank-options-list" style="margin-bottom:24px;">
                <!-- Bank Mandiri -->
                <label class="bank-option-row" style="display:flex; justify-content:space-between; align-items:center; background:#f0fdf4; border:1px solid #0f5927; border-radius:12px; padding:16px 20px; cursor:pointer; margin-bottom:12px; font-family:'Inter', sans-serif; transition:all 0.2s;">
                    <div>
                        <strong class="bank-title" style="color:#0f5927; font-size: 15px;">Bank Mandiri</strong>
                        <div style="font-size:13px; color:#6b7280; margin-top:4px;">No. Rekening: 131-00-1234567-8</div>
                        <div style="font-size:13px; color:#6b7280;">A.N. UMKM Digital Indonesia</div>
                    </div>
                    <div style="display:flex; align-items:center;">
                        <input type="radio" name="selected_bank" value="mandiri" checked style="accent-color: #0f5927; width:18px; height:18px; cursor:pointer;">
                    </div>
                </label>
                
                <!-- BCA -->
                <label class="bank-option-row" style="display:flex; justify-content:space-between; align-items:center; background:#f8fafc; border:1px solid #e5e7eb; border-radius:12px; padding:16px 20px; cursor:pointer; font-family:'Inter', sans-serif; transition:all 0.2s;">
                    <div>
                        <strong class="bank-title" style="color:#111827; font-size: 15px;">Bank Central Asia (BCA)</strong>
                        <div style="font-size:13px; color:#6b7280; margin-top:4px;">No. Rekening: 802-55-12345</div>
                        <div style="font-size:13px; color:#6b7280;">A.N. UMKM Digital Indonesia</div>
                    </div>
                    <div style="display:flex; align-items:center;">
                        <input type="radio" name="selected_bank" value="bca" style="accent-color: #0f5927; width:18px; height:18px; cursor:pointer;">
                    </div>
                </label>
            </div>
            <script>
                document.addEventListener('DOMContentLoaded', function() {
                    const bankOptions = document.querySelectorAll('.bank-option-row');
                    const bankRadios = document.querySelectorAll('input[name="selected_bank"]');
                    bankRadios.forEach(radio => {
                        radio.addEventListener('change', function() {
                            bankOptions.forEach(opt => {
                                opt.style.background = '#f8fafc';
                                opt.style.borderColor = '#e5e7eb';
                                opt.querySelector('.bank-title').style.color = '#111827';
                            });
                            const selectedOption = this.closest('.bank-option-row');
                            selectedOption.style.background = '#f0fdf4';
                            selectedOption.style.borderColor = '#0f5927';
                            selectedOption.querySelector('.bank-title').style.color = '#0f5927';
                        });
                    });
                });
            </script>

            <!-- Amount Block -->
            <div class="amount-box">
                <div class="amount-label">TOTAL TRANSFER</div>
                <div class="amount-value" id="paymentAmount">Rp 0</div>
                <div style="font-size:12px; color:var(--text-grey); margin-top:6px; font-family:'Inter', sans-serif;">
                    Nomor Transaksi: <strong id="paymentTxId">TX-XXXXX</strong>
                </div>
            </div>

            <!-- Flow Progress Steps (Use Case) -->
            <div style="margin: 20px 0 8px 0;">
                <div style="display:flex; align-items:center; justify-content:center; gap:0; font-family:'Inter',sans-serif; font-size:11px; flex-wrap:wrap;">
                    <div style="display:flex; flex-direction:column; align-items:center; gap:4px;">
                        <div style="width:32px; height:32px; border-radius:50%; background:#86efac; color:#0f5927; display:flex; align-items:center; justify-content:center; font-size:16px;">✓</div>
                        <span style="color:#6b7280; text-align:center;">Pembayaran<br>QRIS</span>
                    </div>
                    <div style="width:40px; height:2px; background:#0f5927; margin-bottom:18px;"></div>
                    <div style="display:flex; flex-direction:column; align-items:center; gap:4px;">
                        <div style="width:32px; height:32px; border-radius:50%; background:#0f5927; color:white; display:flex; align-items:center; justify-content:center; font-weight:700; font-size:13px;">2</div>
                        <span style="color:#0f5927; font-weight:700; text-align:center;">Upload Bukti<br>Pembayaran</span>
                    </div>
                    <div style="width:40px; height:2px; background:#d1fae5; margin-bottom:18px;"></div>
                    <div style="display:flex; flex-direction:column; align-items:center; gap:4px;">
                        <div style="width:32px; height:32px; border-radius:50%; background:#d1fae5; color:#6b7280; display:flex; align-items:center; justify-content:center; font-weight:700; font-size:13px;">3</div>
                        <span style="color:#6b7280; text-align:center;">Notifikasi</span>
                    </div>
                    <div style="width:40px; height:2px; background:#d1fae5; margin-bottom:18px;"></div>
                    <div style="display:flex; flex-direction:column; align-items:center; gap:4px;">
                        <div style="width:32px; height:32px; border-radius:50%; background:#d1fae5; color:#6b7280; display:flex; align-items:center; justify-content:center; font-weight:700; font-size:13px;">4</div>
                        <span style="color:#6b7280; text-align:center;">Riwayat<br>Transaksi</span>
                    </div>
                </div>
            </div>

            <!-- Upload Area -->
            <form id="paymentConfirmForm">
                <div class="upload-zone" id="uploadZone">
                    <!-- Upload cloud icon -->
                    <svg class="upload-icon" xmlns="http://www.w3.org/2000/svg" width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
                        <polyline points="17 8 12 3 7 8"></polyline>
                        <line x1="12" y1="3" x2="12" y2="15"></line>
                    </svg>
                    <div class="upload-text">
                        <strong>Klik untuk unggah</strong> atau seret bukti transfer Anda kemari
                    </div>
                    <div class="upload-preview" id="uploadPreview">Belum ada file terpilih</div>
                    <input type="file" id="paymentProofFile" style="display:none;" accept="image/*">
                </div>

                <button type="submit" class="btn-payment-confirm">
                    <span>Kirim Bukti – Lanjut ke Notifikasi</span>
                    <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                        <line x1="5" y1="12" x2="19" y2="12"></line>
                        <polyline points="12 5 19 12 12 19"></polyline>
                    </svg>
                </button>
            </form>
        </div>
    </main>

    <!-- 5. Footer Component (Injected dynamically) -->
    <footer class="main-footer"></footer>

    <!-- Scripts -->
    <script src="../js/notification.js"></script>
    <script src="../js/payment.js"></script>
</body>
</html>
