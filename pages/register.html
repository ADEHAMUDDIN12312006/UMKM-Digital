<!DOCTYPE html>
<html lang="id">
<head>
    <script src="../js/auth-guard.js"></script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daftar Akun Baru - UMKM Digital</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #f0fdf4;
            min-height: 100vh;
        }

        .login-container {
            display: flex;
            min-height: 100vh;
        }

        /* ===== LEFT PANEL ===== */
        .left-panel {
            flex: 1;
            background: #f0fdf4;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 60px 40px;
            position: relative;
        }

        .left-content {
            text-align: center;
            max-width: 400px;
        }

        .illustration-wrapper {
            margin-bottom: 40px;
        }

        .illustration-img {
            max-width: 100%;
            height: auto;
            border-radius: 16px;
        }

        .left-headline {
            font-size: 32px;
            font-weight: 800;
            color: #0f5927;
            margin-bottom: 16px;
            line-height: 1.2;
        }

        .left-subheadline {
            font-size: 15px;
            color: #6b7280;
            line-height: 1.6;
            max-width: 320px;
            margin: 0 auto;
        }

        .left-footer {
            position: absolute;
            bottom: 40px;
            display: flex;
            gap: 24px;
        }

        .badge {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 13px;
            color: #6b7280;
        }

        .badge svg {
            width: 16px;
            height: 16px;
            color: #0f5927;
        }

        /* ===== RIGHT PANEL ===== */
        .right-panel {
            flex: 1;
            background: white;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 60px 40px;
        }

        .form-container {
            width: 100%;
            max-width: 420px;
        }

        .form-header {
            text-align: center;
            margin-bottom: 32px;
        }

        .pin-icon-wrapper {
            margin-bottom: 16px;
        }

        .form-title {
            font-size: 26px;
            font-weight: 700;
            color: #111827;
            margin-bottom: 8px;
        }

        .form-subtitle {
            font-size: 14px;
            color: #6b7280;
        }

        /* ===== INPUT FIELDS ===== */
        .input-group {
            margin-bottom: 20px;
        }

        .input-label {
            display: block;
            font-size: 14px;
            font-weight: 500;
            color: #374151;
            margin-bottom: 8px;
        }

        .input-wrapper {
            position: relative;
            display: flex;
            align-items: center;
        }

        .input-icon-left {
            position: absolute;
            left: 14px;
            color: #9ca3af;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .input-icon-left svg {
            width: 18px;
            height: 18px;
        }

        .input-field {
            width: 100%;
            padding: 12px 16px 12px 44px;
            border: 1px solid #e5e7eb;
            border-radius: 10px;
            font-size: 14px;
            color: #111827;
            background: #f9fafb;
            transition: all 0.2s;
            outline: none;
        }

        .input-field:focus {
            border-color: #0f5927;
            background: white;
            box-shadow: 0 0 0 3px rgba(15, 89, 39, 0.08);
        }

        .input-field::placeholder {
            color: #9ca3af;
        }

        /* ===== SUBMIT BUTTON ===== */
        .btn-submit {
            width: 100%;
            padding: 14px 24px;
            background: #0f5927;
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            transition: all 0.2s;
            margin-top: 8px;
        }

        .btn-submit:hover {
            background: #0d4d22;
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(15, 89, 39, 0.25);
        }

        .btn-submit svg {
            width: 18px;
            height: 18px;
        }

        /* ===== FORM FOOTER ===== */
        .form-footer {
            text-align: center;
            margin-top: 24px;
            font-size: 14px;
            color: #6b7280;
        }

        .form-footer a {
            color: #0f5927;
            font-weight: 600;
            text-decoration: none;
        }

        .form-footer a:hover {
            text-decoration: underline;
        }

        /* ===== RESPONSIVE ===== */
        @media (max-width: 900px) {
            .login-container {
                flex-direction: column;
            }

            .left-panel {
                display: none;
            }

            .right-panel {
                padding: 40px 24px;
                min-height: 100vh;
            }
        }
    </style>
<base target="_blank">
</head>
<body>
    <main class="login-container">
        <!-- Left Side - Illustration & Value Proposition -->
        <section class="left-panel">
            <div class="left-content">
                <div class="illustration-wrapper">
                    <img src="../image/ilustrasi-umkm.png" alt="Ilustrasi UMKM Digital" class="illustration-img">
                </div>
                <div class="left-typography">
                    <h1 class="left-headline">Berdayakan Bisnis Lokal</h1>
                    <p class="left-subheadline">Bergabunglah dengan ribuan pembeli lainnya untuk mendukungi produk lokal buatan Indonesia.</p>
                </div>
            </div>

            <div class="left-footer">
                <div class="badge">
                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"></path>
                        <polyline points="22 4 12 14.01 9 11.01"></polyline>
                    </svg>
                    <span>Terverifikasi</span>
                </div>
                <div class="badge">
                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"></path>
                    </svg>
                    <span>Aman & Terpercaya</span>
                </div>
            </div>
        </section>

        <!-- Right Side - Register Form Interface -->
        <section class="right-panel">
            <div class="form-container">
                <div class="form-header">
                    <div class="pin-icon-wrapper">
                        <!-- Custom Location Pin Icon -->
                        <svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 24 24">
                            <path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7zm0 9.5c-1.38 0-2.5-1.12-2.5-2.5s1.12-2.5 2.5-2.5 2.5 1.12 2.5 2.5-1.12 2.5-2.5 2.5z" fill="#0f5927"/>
                        </svg>
                    </div>
                    <h2 class="form-title">Daftar Akun</h2>
                    <p class="form-subtitle">Buat akun untuk mulai memesan produk lokal</p>
                </div>

                <form id="registerForm" class="login-form">
                    <!-- Username Field -->
                    <div class="input-group">
                        <label for="regUsername" class="input-label">Username</label>
                        <div class="input-wrapper">
                            <span class="input-icon-left">
                                <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                    <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
                                    <circle cx="12" cy="7" r="4"></circle>
                                </svg>
                            </span>
                            <input type="text" id="regUsername" class="input-field" placeholder="Masukkan username" required autocomplete="username">
                        </div>
                    </div>

                    <!-- Email Field -->
                    <div class="input-group">
                        <label for="regEmail" class="input-label">Alamat Email</label>
                        <div class="input-wrapper">
                            <span class="input-icon-left">
                                <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                    <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"></path>
                                    <polyline points="22,6 12,13 2,6"></polyline>
                                </svg>
                            </span>
                            <input type="email" id="regEmail" class="input-field" placeholder="Masukkan alamat email" required autocomplete="email">
                        </div>
                    </div>

                    <!-- Password Field -->
                    <div class="input-group">
                        <label for="regPassword" class="input-label">Kata Sandi</label>
                        <div class="input-wrapper">
                            <span class="input-icon-left">
                                <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                    <rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect>
                                    <path d="M7 11V7a5 5 0 0 1 10 0v4"></path>
                                </svg>
                            </span>
                            <input type="password" id="regPassword" class="input-field" placeholder="Masukkan kata sandi" required autocomplete="new-password">
                        </div>
                    </div>

                    <!-- Confirm Password Field -->
                    <div class="input-group">
                        <label for="regConfirmPassword" class="input-label">Konfirmasi Kata Sandi</label>
                        <div class="input-wrapper">
                            <span class="input-icon-left">
                                <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                    <rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect>
                                    <path d="M7 11V7a5 5 0 0 1 10 0v4"></path>
                                </svg>
                            </span>
                            <input type="password" id="regConfirmPassword" class="input-field" placeholder="Konfirmasi kata sandi" required autocomplete="new-password">
                        </div>
                    </div>

                    <!-- Submit Button -->
                    <button type="submit" class="btn-submit">
                        <span>Daftar Sekarang</span>
                        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                            <line x1="5" y1="12" x2="19" y2="12"></line>
                            <polyline points="12 5 19 12 12 19"></polyline>
                        </svg>
                    </button>
                </form>

                <!-- Footer Right -->
                <div class="form-footer">
                    <span>Sudah memiliki akun? <a href="login.html">Masuk Disini</a></span>
                </div>
            </div>
        </section>
    </main>

    <!-- Custom JavaScript Link -->
    <script src="../js/login.js"></script>
</body>
</html>
