<!DOCTYPE html>
<html lang="id">
<head>
    <script src="../js/auth-guard.js"></script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Pengguna - UMKM Digital</title>
    <!-- Custom CSS Links -->
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="../css/dashboard.css">
    <style>
        /* ===== QUICK ACTION BUTTONS ===== */
        .quick-actions-bar {
            max-width: 1200px;
            margin: 0 auto 24px auto;
            padding: 0 4%;
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
        }

        .btn-quick-action {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 12px 20px;
            border-radius: 10px;
            font-size: 14px;
            font-weight: 600;
            text-decoration: none;
            transition: all 0.2s ease;
            cursor: pointer;
            border: none;
            font-family: 'Plus Jakarta Sans', sans-serif;
        }

        .btn-quick-action.primary {
            background: var(--primary-green, #0f5927);
            color: white;
            box-shadow: 0 4px 12px rgba(15, 89, 39, 0.15);
        }

        .btn-quick-action.primary:hover {
            background: var(--hover-green, #0a3d1b);
            transform: translateY(-2px);
            box-shadow: 0 6px 16px rgba(15, 89, 39, 0.25);
        }

        .btn-quick-action.secondary {
            background: white;
            color: var(--primary-green, #0f5927);
            border: 1.5px solid var(--border-color, #e5e7eb);
        }

        .btn-quick-action.secondary:hover {
            border-color: var(--primary-green, #0f5927);
            background: #f0fdf4;
            transform: translateY(-2px);
        }

        .btn-quick-action svg {
            width: 18px;
            height: 18px;
        }

        /* ===== FLOATING ACTION BUTTONS (Mobile) ===== */
        .fab-container {
            display: none;
            position: fixed;
            bottom: 24px;
            right: 24px;
            z-index: 1000;
            flex-direction: column;
            gap: 12px;
        }

        .fab-btn {
            width: 56px;
            height: 56px;
            border-radius: 50%;
            border: none;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 16px rgba(0,0,0,0.15);
            transition: all 0.2s ease;
            text-decoration: none;
        }

        .fab-btn:hover {
            transform: scale(1.1);
        }

        .fab-btn.primary {
            background: var(--primary-green, #0f5927);
            color: white;
        }

        .fab-btn.secondary {
            background: white;
            color: var(--primary-green, #0f5927);
            border: 2px solid var(--primary-green, #0f5927);
        }

        .fab-btn svg {
            width: 24px;
            height: 24px;
        }

        /* Tooltip for FAB */
        .fab-wrapper {
            position: relative;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .fab-tooltip {
            position: absolute;
            right: 68px;
            background: #1f2937;
            color: white;
            padding: 6px 12px;
            border-radius: 6px;
            font-size: 12px;
            font-weight: 600;
            white-space: nowrap;
            opacity: 0;
            transform: translateX(10px);
            transition: all 0.2s ease;
            pointer-events: none;
        }

        .fab-wrapper:hover .fab-tooltip {
            opacity: 1;
            transform: translateX(0);
        }

        /* Responsive */
        @media (max-width: 768px) {
            .quick-actions-bar {
                display: none;
            }
            .fab-container {
                display: flex;
            }
        }

        /* Hide global search bar in header on dashboard page */
        .main-header .search-bar {
            display: none !important;
        }
    </style>
<base target="_blank">
</head>
<body>
    <!-- 1. Header Component (Top Navigation - Injected dynamically) -->
    <header class="main-header"></header>

    <!-- Welcome Banner Header -->
    <div style="max-width: 1200px; margin: 32px auto 0 auto; padding: 0 4%;">
        <div class="welcome-banner">
            <div class="welcome-text">
                <h2>Selamat Datang Kembali, <span id="buyerWelcomeName">PEMBELI</span>!</h2>
                <p>Pantau status pesanan produk lokal Anda dan tanyakan informasi apa pun kepada asisten AI kami.</p>
            </div>
            <!-- Hand waving badge representation -->
            <div style="font-size: 36px; padding-right: 12px; animation: wave 1.2s ease infinite;">👋</div>
        </div>
    </div>

    <!-- ===== QUICK ACTION BUTTONS ===== -->
    <div class="quick-actions-bar">
        <a href="../index.html" class="btn-quick-action secondary">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path>
                <polyline points="9 22 9 12 15 12 15 22"></polyline>
            </svg>
            <span>Home</span>
        </a>
        <a href="../index.html#products" class="btn-quick-action primary">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                <circle cx="9" cy="21" r="1"></circle>
                <circle cx="20" cy="21" r="1"></circle>
                <path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"></path>
            </svg>
            <span>Lanjut Belanja</span>
        </a>
        <a href="keranjang.html" class="btn-quick-action secondary">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                <path d="M6 2L3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4z"></path>
                <line x1="3" y1="6" x2="21" y2="6"></line>
                <path d="M16 10a4 4 0 0 1-8 0"></path>
            </svg>
            <span>Keranjang</span>
        </a>
        <a href="notifikasi.html" class="btn-quick-action secondary">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"></path>
                <path d="M13.73 21a2 2 0 0 1-3.46 0"></path>
            </svg>
            <span>Notifikasi</span>
        </a>
    </div>

    <!-- Main Grid Content -->
    <main class="dashboard-layout">
        <!-- Column 1: AI Chatbot Assistant -->
        <section class="dashboard-card">
            <h3 class="card-title">
                <!-- AI bot face icon -->
                <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
                    <rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect>
                    <path d="M12 2v9M8 5h8M6 14h.01M18 14h.01"></path>
                </svg>
                <span>Asisten Pembelian AI</span>
            </h3>

            <!-- Messages Log container -->
            <div class="chat-messages-container" id="chatMessages">
                <!-- Will be dynamically populated via js/dashboard.js -->
            </div>

            <!-- Input area -->
            <div class="chat-input-wrapper">
                <input type="text" id="chatInput" class="chat-input" placeholder="Tanyakan ongkir, rekomendasi produk, promo...">
                <button type="button" class="btn-chat-send" id="chatSendBtn">
                    <span>Kirim</span>
                </button>
            </div>
        </section>

        <!-- Column 2: Order History -->
        <section class="dashboard-card">
            <h3 class="card-title">
                <!-- Shopping bag icon -->
                <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M6 2L3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4z"></path>
                    <line x1="3" y1="6" x2="21" y2="6"></line>
                    <path d="M16 10a4 4 0 0 1-8 0"></path>
                </svg>
                <span>Riwayat Pesanan Anda</span>
            </h3>

            <div class="tx-table-container">
                <table class="tx-table">
                    <thead>
                        <tr>
                            <th>No. Transaksi</th>
                            <th>Tanggal</th>
                            <th>Total</th>
                            <th>Status</th>
                        </tr>
                    </thead>
                    <tbody id="txTableBody">
                        <!-- Will be dynamically populated via js/dashboard.js -->
                    </tbody>
                </table>
            </div>
        </section>
    </main>

    <!-- ===== FLOATING ACTION BUTTONS (Mobile Only) ===== -->
    <div class="fab-container">
        <div class="fab-wrapper">
            <span class="fab-tooltip">Home</span>
            <a href="../index.html" class="fab-btn secondary" aria-label="Home">
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path>
                    <polyline points="9 22 9 12 15 12 15 22"></polyline>
                </svg>
            </a>
        </div>
        <div class="fab-wrapper">
            <span class="fab-tooltip">Lanjut Belanja</span>
            <a href="../index.html#products" class="fab-btn primary" aria-label="Lanjut Belanja">
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                    <circle cx="9" cy="21" r="1"></circle>
                    <circle cx="20" cy="21" r="1"></circle>
                    <path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"></path>
                </svg>
            </a>
        </div>
    </div>

    <!-- 5. Footer Component (Injected dynamically) -->
    <footer class="main-footer"></footer>

    <!-- CSS Keyframe wave animation -->
    <style>
        @keyframes wave {
            0%, 100% { transform: rotate(0deg); }
            50% { transform: rotate(15deg); }
        }
    </style>

    <!-- Scripts -->
    <script src="../js/notification.js"></script>
    <script src="../js/dashboard.js"></script>
</body>
</html>
