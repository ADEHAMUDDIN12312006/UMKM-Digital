<!DOCTYPE html>
<html lang="id">
<head>
    <script src="../js/auth-guard.js"></script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mengelola Pelanggan - Panel Admin</title>
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="../css/admin.css">
    <style>
        .form-row { display:flex; gap:16px; }
        .form-group { display:flex; flex-direction:column; gap:6px; }
        .form-group label { font-size:13px; font-weight:700; color:#374151; }
        .form-input { width:100%; padding:10px 12px; border:1px solid var(--border-color); border-radius:6px; outline:none; font-size:14px; font-family:'Inter',sans-serif; box-sizing:border-box; }
        .form-input:focus { border-color:var(--primary-green); }
        .search-bar { display:flex; gap:12px; margin-bottom:20px; align-items:center; }
        .search-bar input { flex:1; padding:10px 14px; border:1px solid var(--border-color); border-radius:8px; font-size:14px; font-family:'Inter',sans-serif; outline:none; }
        .search-bar input:focus { border-color:var(--primary-green); }
        .status-badge { display:inline-block; padding:4px 10px; border-radius:20px; font-size:11px; font-weight:700; }
        .status-badge.aktif { background:#d1fae5; color:#065f46; }
        .status-badge.nonaktif { background:#fee2e2; color:#991b1b; }
        .customer-avatar { width:36px; height:36px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:14px; font-weight:800; color:#fff; flex-shrink:0; }
        .detail-section { margin-bottom:20px; }
        .detail-section-title { font-size:14px; font-weight:800; color:var(--text-dark); margin-bottom:12px; padding-bottom:8px; border-bottom:1px solid var(--border-color); }
        .detail-row { display:flex; justify-content:space-between; padding:8px 0; font-size:13px; border-bottom:1px solid #f1f5f9; }
        .detail-row:last-child { border-bottom:none; }
        .detail-label { color:var(--text-grey); font-weight:600; }
        .detail-value { font-weight:700; color:var(--text-dark); text-align:right; }
    </style>
</head>
<body>
<div class="admin-layout-wrapper">
    <aside class="sidebar-admin-container"></aside>
    <main class="admin-main-content">
        <div class="admin-header-row">
            <div class="admin-title-group">
                <h1>Kelola Pelanggan</h1>
                <p>Lihat daftar pelanggan terdaftar, riwayat pembelian, dan kelola status akun.</p>
            </div>
            <button class="btn-admin primary" id="btnOpenAddUserModal" style="display:flex;align-items:center;gap:8px;">
                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M16 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="8.5" cy="7" r="4"/><line x1="20" y1="8" x2="20" y2="14"/><line x1="23" y1="11" x2="17" y2="11"/></svg>
                <span>Tambah Pelanggan</span>
            </button>
        </div>

        <section class="admin-panel-card">
            <div class="panel-header-row">
                <h2 class="panel-title">Daftar Pelanggan</h2>
                <span id="customerCount" style="font-size:13px;color:var(--text-grey);font-weight:600;"></span>
            </div>
            <!-- Search Bar -->
            <div class="search-bar">
                <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#9ca3af" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
                <input type="text" id="searchCustomer" placeholder="Cari nama atau email pelanggan...">
            </div>
            <div style="overflow-x:auto;">
                <table class="admin-table">
                    <thead>
                        <tr>
                            <th>No</th>
                            <th>Nama</th>
                            <th>Email</th>
                            <th>Total Transaksi</th>
                            <th>Total Belanja</th>
                            <th>Bergabung</th>
                            <th>Status</th>
                            <th>Aksi</th>
                        </tr>
                    </thead>
                    <tbody id="adminUsersTableBody">
                        <!-- Diisi admin.js -->
                    </tbody>
                </table>
            </div>
        </section>
    </main>
</div>

<!-- Modal Detail Pelanggan & Riwayat Pembelian -->
<div class="modal-overlay" id="customerDetailModal" style="display:none;">
    <div class="modal-card" style="max-width:600px;">
        <div class="modal-header">
            <h3>Detail Pelanggan</h3>
            <button type="button" onclick="document.getElementById('customerDetailModal').style.display='none'" style="background:none;border:none;cursor:pointer;color:var(--text-grey);">
                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
            </button>
        </div>
        <div class="modal-body" id="customerDetailBody">
            <!-- Diisi admin.js -->
        </div>
        <div class="modal-footer">
            <button type="button" class="btn-admin secondary" onclick="document.getElementById('customerDetailModal').style.display='none'">Tutup</button>
            <button type="button" class="btn-admin danger" id="btnToggleAccountStatus">Nonaktifkan Akun</button>
        </div>
    </div>
</div>

<!-- Modal Tambah Pelanggan -->
<div class="modal-overlay" id="addUserModal" style="display:none;">
    <div class="modal-card">
        <div class="modal-header">
            <h3>Tambah Pelanggan Baru</h3>
            <button type="button" id="btnCloseAddUserModal" style="background:none;border:none;cursor:pointer;color:var(--text-grey);" aria-label="Tutup modal">
                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
            </button>
        </div>
        <form id="addUserForm">
            <div class="modal-body">
                <div class="form-group">
                    <label for="newUsername">Username</label>
                    <input type="text" id="newUsername" class="form-input" placeholder="Masukkan username" required>
                </div>
                <div class="form-group">
                    <label for="newEmail">Email</label>
                    <input type="email" id="newEmail" class="form-input" placeholder="email@contoh.com" required>
                </div>
                <div class="form-group">
                    <label for="newRole">Peran (Role)</label>
                    <select id="newRole" class="form-input" required>
                        <option value="pembeli">Pembeli</option>
                        <option value="admin">Admin</option>
                    </select>
                </div>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn-admin secondary" onclick="document.getElementById('addUserModal').style.display='none'">Batal</button>
                <button type="submit" class="btn-admin primary">Simpan Pelanggan</button>
            </div>
        </form>
    </div>
</div>

<script src="../js/notification.js"></script>
<script src="../js/admin.js"></script>
</body>
</html>
